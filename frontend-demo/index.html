<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智学·多智能体 — 学习工作台</title>
<link rel="stylesheet" href="app.css">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="toast" class="toast" style="display:none"></div>

<div class="app">
<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">智</div>
    <span class="logo-text">智学·多智能体</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-page="dashboard">
      <span class="nav-icon">📊</span><span>数据看板</span>
    </div>
    <div class="nav-item" data-page="assistant">
      <span class="nav-icon">💬</span><span>学习助手</span>
    </div>
    <div class="nav-item" data-page="generator">
      <span class="nav-icon">⚡</span><span>资源生成</span>
    </div>
    <div class="nav-item" data-page="courses">
      <span class="nav-icon">📚</span><span>课程管理</span>
    </div>
    <div class="nav-item" data-page="knowledge">
      <span class="nav-icon">🧠</span><span>知识库</span>
    </div>
    <div class="nav-item" data-page="learning-path">
      <span class="nav-icon">🗺️</span><span>学习路径</span>
    </div>
    <div class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span><span>设置</span>
    </div>
  </nav>
  <div class="sidebar-footer" id="sidebar-footer">
    <span class="status-dot offline"></span> 未连接
  </div>
</aside>

<!-- ═══════════════════ MAIN AREA ═══════════════════ -->
<div class="main-area">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-toggle" onclick="_toggleSidebar()">☰</span>
      <span class="topbar-course" id="topbar-course">未选择</span>
      <span class="topbar-badge warn" id="topbar-badge">未登录</span>
    </div>
    <div class="topbar-right">
      <span style="font-size:11px;color:var(--gray-400)" id="topbar-time"></span>
      <div class="topbar-user" id="topbar-user">
        <button class="btn btn-sm btn-primary" onclick="_loginDemo()">演示账号登录</button>
      </div>
      <button class="btn btn-sm btn-outline" onclick="_logout()" style="display:none" id="btn-logout">退出</button>
    </div>
  </header>

  <!-- ═══════ PAGE: Dashboard ═══════ -->
  <main class="page-content page active" id="page-dashboard"></main>

  <!-- ═══════ PAGE: Assistant ═══════ -->
  <main class="page-content page" id="page-assistant">
    <div class="assistant-layout">
      <!-- Chat Panel -->
      <div class="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
          <div class="chat-input-row">
            <textarea id="chat-input" placeholder="向 Tutor Agent 提问..." rows="2"></textarea>
            <button class="btn btn-primary" onclick="_sendQuestion()">发送</button>
          </div>
          <div class="chat-quick-btns">
            <button onclick="_quickGenerate('mindmap')">🧠 生成思维导图</button>
            <button onclick="_quickGenerate('quiz')">📝 启动测验</button>
            <button onclick="_quickGenerate('lecture_doc')">📄 生成讲义</button>
            <button onclick="_quickGenerate('ppt')">📊 生成PPT</button>
            <button onclick="_quickGenerate('study_plan')">🗺️ 学习路径</button>
          </div>
        </div>
      </div>

      <!-- Artifacts Panel -->
      <div class="artifacts-panel">
        <div class="artifacts-tabs" id="artifacts-tabs"></div>
        <div class="artifacts-content" id="artifacts-content">
          <div class="tab-panel" id="artifact-mindmap"><div class="empty-state"><div class="empty-icon">🧠</div><p>思维导图展示区</p><p style="font-size:11px;color:var(--gray-400)">提问后生成或点击快捷按钮</p></div></div>
          <div class="tab-panel" id="artifact-quiz"><div class="empty-state"><div class="empty-icon">📝</div><p>练习题库展示区</p></div></div>
          <div class="tab-panel" id="artifact-lecture"><div class="empty-state"><div class="empty-icon">📄</div><p>讲义文档展示区</p></div></div>
          <div class="tab-panel" id="artifact-ppt"><div class="empty-state"><div class="empty-icon">📊</div><p>PPT预习区</p></div></div>
          <div class="tab-panel" id="artifact-study_plan"><div class="empty-state"><div class="empty-icon">🗺️</div><p>学习路径展示区</p></div></div>
        </div>
      </div>

      <!-- Citations Panel -->
      <div class="citations-panel" id="citations-panel">
        <h4>📚 文献溯源</h4>
        <p style="font-size:12px;color:var(--gray-400)">提问后显示引用来源</p>
        <div style="margin-top:12px" id="agent-viz">
          <h4>🤖 多智能体协作</h4>
          <p style="font-size:11px;color:var(--gray-400)">提问后显示协作过程</p>
        </div>
        <div class="profile-mini" id="profile-mini" style="margin-top:12px">
          <h4>🎓 学习画像</h4>
          <canvas id="profileRadarChart" width="240" height="240" style="max-width:100%;margin:8px 0;display:none"></canvas>
          <p style="font-size:11px;color:var(--gray-400)" id="profile-text">尚未提取画像</p>
        </div>
      </div>
    </div>
  </main>

  <!-- ═══════ PAGE: Generator ═══════ -->
  <main class="page-content page" id="page-generator"></main>

  <!-- ═══════ PAGE: Courses ═══════ -->
  <main class="page-content page" id="page-courses"></main>

  <!-- ═══════ PAGE: Knowledge Base ═══════ -->
  <main class="page-content page" id="page-knowledge"></main>

  <!-- ═══════ PAGE: Learning Path ═══════ -->
  <main class="page-content page" id="page-learning-path"></main>

  <!-- ═══════ PAGE: Settings ═══════ -->
  <main class="page-content page" id="page-settings"></main>
</div>
</div>

<script src="app.js"></script>
</body>
</html>
