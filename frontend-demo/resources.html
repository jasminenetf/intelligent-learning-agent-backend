<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>资源面板</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 'Segoe UI','Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333;max-width:900px;margin:0 auto;padding:16px}
h1{color:#1a56db;margin-bottom:4px;font-size:20px}
.sub{color:#888;font-size:12px;margin-bottom:16px}
.nav{margin-bottom:16px}.nav a{color:#1a56db;margin-right:12px;font-size:13px}
.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h2{font-size:14px;color:#1a56db;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:6px}
input,textarea,select{width:100%;padding:8px;border:1px solid #d0d5dd;border-radius:4px;font-size:13px;margin:4px 0}
button{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;margin:4px 4px 4px 0}
.btn-p{background:#1a56db;color:#fff}.btn-s{background:#e8e8e8;color:#333}
.btn-g{background:#16a34a;color:#fff;width:100%;padding:12px;font-size:14px;font-weight:700}
.msg{padding:8px;border-radius:4px;margin:8px 0;font-size:12px}
.msg-ok{background:#dcfce7;color:#166534}.msg-err{background:#fee2e2;color:#991b1b}.msg-info{background:#dbeafe;color:#1e40af}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin:2px}
.badge-ok{background:#dcfce7;color:#166534}.badge-err{background:#fee2e2;color:#991b1b}
.row{display:flex;gap:8px}.row>*{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px}
.step{border-left:3px solid #1a56db;padding:8px 12px;margin:6px 0;background:#f8f9fb;border-radius:0 6px 6px 0}
.step h4{font-size:13px;margin-bottom:2px}.step p{font-size:11px;color:#666;margin:2px 0}
.quiz-item{border:1px solid #e0e0e0;padding:8px;margin:6px 0;border-radius:6px}
.quiz-item .q{font-weight:600;font-size:13px}
.quiz-item .opt{padding:2px 6px;margin:2px 0;border-radius:3px;font-size:12px}
.quiz-item .opt.correct{background:#dcfce7;font-weight:600}
.quiz-item .expl{font-size:11px;color:#666;margin-top:4px;padding-top:4px;border-top:1px dashed #ddd}
pre{background:#1e293b;color:#e2e8f0;padding:10px;border-radius:6px;font-size:12px;overflow-x:auto;max-height:300px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#1a56db;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<h1>📚 智能学习Agent — 资源面板</h1>
<div class="sub">基于 DeepSeek 的个性化学习资源生成</div>
<div class="nav"><a href="index.html">← 返回聊天</a></div>

<div class="card"><h2>🔌 连接</h2>
<div class="row">
<div><label>后端</label><input id="apiBase" value="http://127.0.0.1:8000"></div>
<div><label>Token</label><input id="token" placeholder="登录后自动填入"></div>
<div><label>课程ID</label><input id="courseId" value="2"></div>
</div>
<div class="row" style="margin-top:8px">
<button class="btn-p" onclick="doLogin()">登录</button>
<button class="btn-s" onclick="checkStatus()">检查状态</button>
<button class="btn-s" onclick="listCourses()">刷新课程</button>
</div>
<div id="statusBar" style="margin-top:8px"></div>
<div id="loginMsg"></div>
</div>

<div class="card"><h2>👤 学生画像</h2>
<textarea id="profileMsg" rows="2">我是计算机专业学生，高等数学导数和极限比较薄弱，希望用图和例题学习，节奏慢一点。</textarea>
<button class="btn-p" onclick="extractProfile()">提取画像</button>
<div id="profileResult"></div>
</div>

<div class="card"><h2>🎯 资源生成</h2>
<div class="row">
<div><label>主题</label><input id="resTopic" value="导数与极限入门"></div>
<div><label>类型</label>
<select id="resType" multiple size="5" style="height:100px">
<option value="mindmap" selected>思维导图</option>
<option value="lecture_doc">讲义</option>
<option value="quiz">测验</option>
<option value="ppt">课件PPT</option>
<option value="study_plan">学习路径</option>
</select></div>
</div>
<button class="btn-g" onclick="generateAll()" style="margin-top:8px">🐼 一键生成全部</button>
<div id="resOutput" style="margin-top:12px"></div>
</div>

<script>
mermaid.initialize({startOnLoad:false,theme:'default'});

const LS={get(k){try{return localStorage.getItem('r_'+k)}catch{return null}},set(k,v){try{localStorage.setItem('r_'+k,v)}catch{}},del(k){try{localStorage.removeItem('r_'+k)}catch{}}};

function api(path,opts={}){
 const base=($('apiBase').value||'http://127.0.0.1:8000').replace(/\/$/,'');
 const tk=$('token').value||'';
 const h={'Content-Type':'application/json'};
 if(tk)h['Authorization']='Bearer '+tk;
 return fetch(base+path,{...opts,headers:h}).then(r=>r.json().then(d=>({ok:r.ok,status:r.status,data:d})),()=>({ok:false,status:0,data:{detail:'Network Error'}}));
}

const $=id=>document.getElementById(id);
function B(t,c){return `<span class="badge badge-${c}">${t}</span>`}
function M(t,c){return `<div class="msg msg-${c}">${t}</div>`}
function S(id,h){$(id).innerHTML=h}
function A(id,h){$(id).innerHTML+=h}
function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function doLogin(){
 try{
  const r=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:'admin_ocr',password:'admintest123'})});
  if(r.ok){$('token').value=r.data.access_token;S('loginMsg',M('登录成功 ✓','ok'))}
  else S('loginMsg',M('登录失败','err'))
 }catch(e){S('loginMsg',M('网络错误','err'))}
}

async function checkStatus(){
 S('statusBar','<span class="spin"></span>');
 try{
  const r=await api('/api/settings/status');const d=r.data;
  S('statusBar',B(d.is_mock?'Mock':'DeepSeek',d.is_mock?'err':'ok')+' '+B('Embedding:'+(d.embedding_is_mock?'Mock':d.embedding_provider),d.embedding_is_mock?'err':'ok')+' '+B('Key:'+(d.deepseek_configured?'已配':'未配'),d.deepseek_configured?'ok':'err'))
 }catch(e){S('statusBar',B('未连接','err'))}
}

async function listCourses(){
 try{
  const r=await api('/api/courses');
  if(r.ok&&Array.isArray(r.data)&&r.data.length){
   $('courseId').value=r.data[0].id;
   S('statusBar',(document.getElementById('statusBar').innerHTML||'')+' '+B('课程:'+r.data.length,'ok'))
  }
 }catch(e){}
}

async function extractProfile(){
 S('profileResult','<span class="spin"></span>提取中...');
 try{
  const r=await api('/api/profiles/me/extract',{method:'POST',body:JSON.stringify({message:$('profileMsg').value})});
  if(!r.ok){S('profileResult',M('失败: '+(r.data.detail||'error'),'err'));return}
  const d=r.data;let h='<div class="grid2">';
  [['水平',d.knowledge_level],['风格',d.cognitive_style],['节奏',d.pace_preference],['动机',d.motivation||'N/A'],['元学习',d.meta_learning_level],['置信度',(d.confidence||0).toFixed(2)],['专业',d.major||'N/A'],['目标',d.learning_goal||'N/A']].forEach(([k,v])=>{h+=`<div><b>${k}:</b> ${v}</div>`});
  h+='</div>';
  if(d.weak_points&&d.weak_points.length)h+=`<div style="margin-top:4px;font-size:11px"><b>薄弱点:</b> ${d.weak_points.join('、')}</div>`;
  S('profileResult',h)
 }catch(e){S('profileResult',M('错误: '+e.message,'err'))}
}

async function generateAll(){
 S('resOutput','<span class="spin"></span>生成中...');
 const cid=$('courseId').value;
 const topic=$('resTopic').value;
 const types=Array.from($('resType').selectedOptions).map(o=>o.value);
 let h='';
 for(const type of types){
  A('resOutput',`<div style="margin:4px 0;font-size:12px">⏳ 生成 ${type}...</div>`);
  try{
   const r=await api(`/api/resources/courses/${cid}/generate`,{method:'POST',body:JSON.stringify({topic,resource_types:[type],top_k:8})});
   if(r.ok&&r.data.resources&&r.data.resources.length){
    const res=r.data.resources[0];
    h+=`<div class="card"><h2>${type}</h2>`;
    h+=B(res.generated_by,'ok')+' '+B('chunks:'+res.context_chunks,'ok');
    if(res.fallback_used)h+=B('fallback','err');
    
    if(res.mermaid){
     h+=`<pre>${E(res.mermaid)}</pre>`;
     const mid='mm_'+Math.random().toString(36).slice(2,8);
     h+=`<div class="mermaid" id="${mid}">${res.mermaid}</div>`;
     setTimeout(()=>{try{mermaid.run({nodes:[document.getElementById(mid)]})}catch(e){}},200);
    }
    if(res.content)h+=`<div style="white-space:pre-wrap;max-height:400px;overflow-y:auto;background:#f8f9fb;padding:8px;border-radius:4px;font-size:12px;margin-top:8px">${E(res.content).substring(0,3000)}</div>`;
    if(res.items){
     res.items.forEach((it,i)=>{
      h+=`<div class="quiz-item"><div class="q">Q${i+1}. ${E(it.question)}</div>`;
      it.options.forEach((o,j)=>{h+=`<div class="opt${j===it.answer?' correct':''}">${String.fromCharCode(65+j)}. ${E(o)}${j===it.answer?' ✓':''}</div>`});
      h+=`<div class="expl">${E(it.explanation||'')}</div></div>`;
     });
    }
    if(res.download_url){
     const dl='http://127.0.0.1:8000'+res.download_url;
     h+=`<div style="margin-top:8px"><a href="${dl}" target="_blank" style="display:inline-block;padding:8px 16px;background:#1a56db;color:#fff;text-decoration:none;border-radius:4px">下载PPTX (${res.slide_count||'?'}页)</a></div>`;
    }
    if(res.study_plan){
     const sp=res.study_plan;
     h+=`<div style="font-size:12px;color:#666;margin:8px 0">${E(sp.profile_summary||'')}</div>`;
     (sp.steps||[]).forEach(s=>{h+=`<div class="step"><h4>第${s.order||'?'}步: ${E(s.topic||'')}</h4><p>${E(s.reason||'')}</p><p>资源: ${(s.resource_types||[]).join(',')} | ${s.estimated_minutes||'?'}分钟</p><p>练习: ${E(s.practice||'')}</p></div>`});
     if(sp.next_action)h+=`<div style="font-size:12px;color:#1a56db;margin-top:4px"><b>下一步:</b> ${E(sp.next_action)}</div>`;
    }
    h+='</div>';
    S('resOutput',h+'<div style="font-size:12px;color:#666">⏳ 继续生成其他资源...</div>');
   }
  }catch(e){h+=M(`${type} 失败: ${e.message}`,'err')}
 }
 S('resOutput',h+M('✅ 全部完成','ok'));
}

// Auto-init
(async function(){
 const saved=$('token').value||LS.get('token');
 if(saved)$('token').value=saved;
 doLogin().then(()=>{checkStatus();listCourses()});
})();
</script>
</body>
</html>
